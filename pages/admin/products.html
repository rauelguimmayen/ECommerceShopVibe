<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Products – ShopVibe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="admin-page">
  <div class="container py-4">
    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between gap-3 mb-5">
      <div class="d-flex align-items-center gap-3">
        <a href="/pages/admin/dashboard.html" class="btn btn-outline-secondary text-white border-white border-opacity-25">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <p class="text-violet small fw-semibold text-uppercase mb-0">Admin</p>
          <h2 class="text-white fw-black mb-0">Products</h2>
        </div>
      </div>
      <button class="btn btn-sv d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openAdd()">
        <i class="bi bi-plus-lg"></i> Add Product
      </button>
    </div>

    <!-- Table -->
    <div class="admin-card overflow-hidden">
      <div id="products-loading" class="text-center py-5">
        <div class="spinner-border text-violet"></div>
      </div>
      <div id="products-table" class="d-none table-responsive">
        <table class="table table-borderless align-middle mb-0">
          <thead>
            <tr class="text-white-50 small border-bottom border-white border-opacity-10">
              <th class="px-4 py-3">Product</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Featured</th>
              <th class="text-end pe-4">Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody" class="text-white"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content border-0 shadow-lg" style="border-radius:20px">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="modal-title">Add Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-3">
        <div id="modal-error" class="alert alert-danger d-none small"></div>
        <form id="product-form" class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold small">Product Name *</label>
            <input type="text" id="pf-name" class="form-control" required>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold small">Description</label>
            <textarea id="pf-desc" class="form-control" rows="3"></textarea>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold small">Price ($) *</label>
            <input type="number" id="pf-price" class="form-control" step="0.01" min="0" required>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold small">Original Price ($)</label>
            <input type="number" id="pf-original-price" class="form-control" step="0.01" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold small">Stock</label>
            <input type="number" id="pf-stock" class="form-control" min="0" value="0">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Category *</label>
            <select id="pf-category" class="form-select">
              <option value="clothing">Clothing</option>
              <option value="electronics">Electronics</option>
              <option value="accessories">Accessories</option>
              <option value="footwear">Footwear</option>
              <option value="home">Home</option>
              <option value="sports">Sports</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Image URL</label>
            <input type="url" id="pf-image" class="form-control" placeholder="https://...">
          </div>
          <div class="col-md-6">
            <div class="form-check form-switch mt-2">
              <input class="form-check-input" type="checkbox" id="pf-active" checked>
              <label class="form-check-label fw-semibold small" for="pf-active">Active (visible in store)</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check form-switch mt-2">
              <input class="form-check-input" type="checkbox" id="pf-featured">
              <label class="form-check-label fw-semibold small" for="pf-featured">Featured on homepage</label>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold small">Tags (comma-separated)</label>
            <input type="text" id="pf-tags" class="form-control" placeholder="summer, sale, new">
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sv px-4" id="save-btn" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/app.js"></script>
<script>
  let editingId = null;

  fetch('../../components/navbar.html').then(r => r.text()).then(html => {
    document.getElementById('navbar-placeholder').innerHTML = html;
    renderNavUser(); cart.load();
    window.addEventListener('scroll', () => {
      document.getElementById('main-navbar')?.classList.toggle('scrolled', window.scrollY > 20);
    });
  });

  async function loadProducts() {
    const user = api.getUser();
    if (!user || user.role !== 'admin') { window.location.href = '/index.html'; return; }

    try {
      const products = await api.products.adminAll();
      document.getElementById('products-loading').classList.add('d-none');
      document.getElementById('products-table').classList.remove('d-none');

      document.getElementById('products-tbody').innerHTML = products.map(p => `
        <tr class="border-bottom border-white border-opacity-10">
          <td class="px-4 py-3">
            <div class="d-flex align-items-center gap-3">
              <img src="${p.image_url || 'https://via.placeholder.com/48'}" class="rounded" width="48" height="48" style="object-fit:cover">
              <div>
                <p class="fw-semibold mb-0">${p.name}</p>
                <small class="text-white-50 text-truncate" style="max-width:200px;display:block">${p.description || '—'}</small>
              </div>
            </div>
          </td>
          <td><span class="badge bg-white bg-opacity-10 text-capitalize">${p.category}</span></td>
          <td class="fw-bold">$${p.price.toFixed(2)}${p.original_price ? `<small class="text-white-50 ms-1 text-decoration-line-through">$${p.original_price.toFixed(2)}</small>` : ''}</td>
          <td>${p.stock}</td>
          <td>
            <button class="btn btn-sm ${p.is_active ? 'btn-success' : 'btn-secondary'} btn-sm rounded-pill px-3"
                    onclick="toggleActive('${p._id}',${p.is_active})">
              ${p.is_active ? '<i class="bi bi-eye-fill me-1"></i>Active' : '<i class="bi bi-eye-slash-fill me-1"></i>Hidden'}
            </button>
          </td>
          <td>
            ${p.is_featured ? '<i class="bi bi-star-fill text-warning"></i>' : '<i class="bi bi-star text-white-50"></i>'}
          </td>
          <td class="text-end pe-4">
            <div class="d-flex gap-2 justify-content-end">
              <button class="btn btn-sm btn-outline-secondary text-white border-opacity-25" onclick='openEdit(${JSON.stringify(p)})'>
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct('${p._id}','${p.name}')">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>`).join('');
    } catch (e) {
      showToast(e.message, 'danger');
    }
  }

  function openAdd() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add Product';
    document.getElementById('product-form').reset();
    document.getElementById('pf-active').checked = true;
    document.getElementById('pf-featured').checked = false;
    document.getElementById('modal-error').classList.add('d-none');
  }

  function openEdit(p) {
    editingId = p._id;
    document.getElementById('modal-title').textContent = 'Edit Product';
    document.getElementById('pf-name').value = p.name;
    document.getElementById('pf-desc').value = p.description || '';
    document.getElementById('pf-price').value = p.price;
    document.getElementById('pf-original-price').value = p.original_price || '';
    document.getElementById('pf-stock').value = p.stock || 0;
    document.getElementById('pf-category').value = p.category;
    document.getElementById('pf-image').value = p.image_url || '';
    document.getElementById('pf-active').checked = !!p.is_active;
    document.getElementById('pf-featured').checked = !!p.is_featured;
    document.getElementById('pf-tags').value = (p.tags || []).join(', ');
    document.getElementById('modal-error').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('productModal')).show();
  }

  async function saveProduct() {
    const btn = document.getElementById('save-btn');
    const errEl = document.getElementById('modal-error');
    btn.disabled = true; btn.textContent = 'Saving…';
    errEl.classList.add('d-none');

    const name = document.getElementById('pf-name').value.trim();
    const price = parseFloat(document.getElementById('pf-price').value);
    if (!name || isNaN(price)) {
      errEl.textContent = 'Name and price are required.';
      errEl.classList.remove('d-none');
      btn.disabled = false; btn.textContent = 'Save Product'; return;
    }

    const data = {
      name,
      description: document.getElementById('pf-desc').value.trim(),
      price,
      original_price: parseFloat(document.getElementById('pf-original-price').value) || null,
      stock: parseInt(document.getElementById('pf-stock').value) || 0,
      category: document.getElementById('pf-category').value,
      image_url: document.getElementById('pf-image').value.trim(),
      is_active: document.getElementById('pf-active').checked,
      is_featured: document.getElementById('pf-featured').checked,
      tags: document.getElementById('pf-tags').value.split(',').map(t => t.trim()).filter(Boolean)
    };

    try {
      if (editingId) { await api.products.update(editingId, data); showToast('Product updated!'); }
      else { await api.products.create(data); showToast('Product created!'); }
      bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
      loadProducts();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('d-none');
    } finally {
      btn.disabled = false; btn.textContent = 'Save Product';
    }
  }

  async function toggleActive(id, current) {
    try {
      await api.products.update(id, { is_active: !current });
      showToast(!current ? 'Product activated' : 'Product hidden');
      loadProducts();
    } catch (e) { showToast(e.message, 'danger'); }
  }

  async function deleteProduct(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try {
      await api.products.delete(id);
      showToast('Product deleted');
      loadProducts();
    } catch (e) { showToast(e.message, 'danger'); }
  }

  loadProducts();
</script>
</body>
</html>
