<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop – ShopVibe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<!-- Shop Header -->
<div class="bg-sv-dark" style="padding-top:76px">
  <div class="container py-5">
    <p class="text-violet fw-semibold text-uppercase small tracking-widest mb-2">The Collection</p>
    <h1 class="text-white fw-black" style="font-size:clamp(2.5rem,6vw,4.5rem)">All Products</h1>
    <p class="text-white-50 fs-5" id="product-count">Loading...</p>
  </div>
</div>

<div class="container py-5">

  <!-- Filters -->
  <div class="row g-3 mb-4">
    <div class="col-md-7 col-lg-8">
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
        <input type="text" id="search-input" class="form-control border-start-0 ps-0"
               placeholder="Search products…">
        <button class="btn btn-outline-secondary d-none" id="clear-search" onclick="clearSearch()">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </div>
    <div class="col-md-5 col-lg-4">
      <select id="sort-select" class="form-select">
        <option value="newest">Newest First</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
      </select>
    </div>
  </div>

  <!-- Category Pills -->
  <div class="d-flex flex-wrap gap-2 mb-5" id="cat-pills">
    <button class="cat-chip active" data-cat="all">All Categories</button>
    <button class="cat-chip" data-cat="clothing">Clothing</button>
    <button class="cat-chip" data-cat="electronics">Electronics</button>
    <button class="cat-chip" data-cat="accessories">Accessories</button>
    <button class="cat-chip" data-cat="footwear">Footwear</button>
    <button class="cat-chip" data-cat="home">Home</button>
    <button class="cat-chip" data-cat="sports">Sports</button>
  </div>

  <!-- Product Grid -->
  <div id="product-grid" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
    <!-- Skeletons -->
    <div class="col"><div class="skeleton" style="height:320px"></div></div>
    <div class="col"><div class="skeleton" style="height:320px"></div></div>
    <div class="col"><div class="skeleton" style="height:320px"></div></div>
    <div class="col"><div class="skeleton" style="height:320px"></div></div>
    <div class="col"><div class="skeleton" style="height:320px"></div></div>
    <div class="col"><div class="skeleton" style="height:320px"></div></div>
    <div class="col"><div class="skeleton" style="height:320px"></div></div>
    <div class="col"><div class="skeleton" style="height:320px"></div></div>
  </div>

</div>

<!-- Footer -->
<footer class="bg-sv-dark py-4 mt-5">
  <div class="container text-center text-white-50 small">
    &copy; 2026 ShopVibe. All rights reserved.
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
  fetch('../components/navbar.html').then(r => r.text()).then(html => {
    document.getElementById('navbar-placeholder').innerHTML = html;
    renderNavUser();
    cart.load();
    window.addEventListener('scroll', () => {
      document.getElementById('main-navbar')?.classList.toggle('scrolled', window.scrollY > 20);
    });
  });

  let allProducts = [];
  let activeCategory = 'all';
  let searchQuery = '';
  let sortBy = 'newest';

  // Read URL params
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('category')) activeCategory = urlParams.get('category');
  if (urlParams.get('sort')) sortBy = urlParams.get('sort');

  async function loadProducts() {
    try {
      allProducts = await api.products.list({ limit: 200 });
      renderProducts();
    } catch (e) {
      document.getElementById('product-grid').innerHTML =
        `<div class="col-12 text-center text-muted py-5">${e.message}</div>`;
    }
  }

  function renderProducts() {
    let list = [...allProducts];

    // Filter
    if (activeCategory !== 'all') list = list.filter(p => p.category === activeCategory);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q));
    }

    // Sort
    if (sortBy === 'price-asc') list.sort((a, b) => a.price - b.price);
    else if (sortBy === 'price-desc') list.sort((a, b) => b.price - a.price);
    else list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    document.getElementById('product-count').textContent = `${list.length} items available`;

    const grid = document.getElementById('product-grid');
    if (list.length === 0) {
      grid.innerHTML = `
        <div class="col-12 text-center py-5">
          <p class="display-6">🔍</p>
          <h5 class="fw-bold">No products found</h5>
          <p class="text-muted">Try a different search or category</p>
          <button class="btn btn-sv mt-2" onclick="clearFilters()">Clear Filters</button>
        </div>`;
    } else {
      grid.innerHTML = list.map(buildProductCard).join('');
    }
  }

  // Category chips
  document.getElementById('cat-pills').addEventListener('click', e => {
    const chip = e.target.closest('.cat-chip');
    if (!chip) return;
    activeCategory = chip.dataset.cat;
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderProducts();
  });

  // Restore active chip from URL
  document.querySelectorAll('.cat-chip').forEach(c => {
    if (c.dataset.cat === activeCategory) c.classList.add('active');
    else c.classList.remove('active');
  });

  // Search
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    document.getElementById('clear-search').classList.toggle('d-none', !searchQuery);
    renderProducts();
  });

  function clearSearch() {
    document.getElementById('search-input').value = '';
    searchQuery = '';
    document.getElementById('clear-search').classList.add('d-none');
    renderProducts();
  }

  function clearFilters() {
    clearSearch();
    activeCategory = 'all';
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === 'all'));
    renderProducts();
  }

  // Sort
  document.getElementById('sort-select').value = sortBy;
  document.getElementById('sort-select').addEventListener('change', e => {
    sortBy = e.target.value;
    renderProducts();
  });

  loadProducts();
</script>
</body>
</html>
