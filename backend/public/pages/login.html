<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – ShopVibe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .divider-text {
      display: flex; align-items: center; gap: 12px; color: #adb5bd;
      font-size: .8rem; letter-spacing: .05em; text-transform: uppercase; margin: 20px 0;
    }
    .divider-text::before, .divider-text::after {
      content: ''; flex: 1; height: 1px; background: #e9ecef;
    }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; background: #fff; color: #3c4043;
      font-weight: 600; font-size: .9rem; cursor: pointer;
      transition: box-shadow .2s, border-color .2s;
    }
    .btn-google:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); border-color: #c5c5c5; }
    .btn-google:disabled { opacity: .6; cursor: not-allowed; }
    .btn-google svg { flex-shrink: 0; }
  </style>
</head>
<body class="bg-sv-gray" style="min-height:100vh;display:flex;align-items:center">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-8 col-md-6 col-lg-5 col-xl-4">

      <!-- Logo -->
      <div class="text-center mb-4">
        <a href="/index.html" class="text-decoration-none">
          <div class="d-inline-flex align-items-center gap-2">
            <div class="bg-violet rounded-2 d-flex align-items-center justify-content-center" style="width:40px;height:40px">
              <i class="bi bi-lightning-fill text-white fs-5"></i>
            </div>
            <span class="fw-black fs-3 text-dark">Shop<span class="text-violet">Vibe</span></span>
          </div>
        </a>
        <h5 class="mt-3 fw-bold">Welcome back</h5>
        <p class="text-muted small">Sign in to your account</p>
      </div>

      <div class="card border-0 shadow-sm p-4" style="border-radius:20px">
        <div id="error-alert" class="alert alert-danger d-none small"></div>

        <!-- Google Sign-In Button -->
        <button class="btn-google" id="google-btn" type="button">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
          Continue with Google
        </button>

        <div class="divider-text">or sign in with email</div>

        <form id="login-form">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label class="form-label fw-semibold small mb-0">Password</label>
              <a href="/pages/forgot-password.html" class="text-violet small text-decoration-none fw-semibold">Forgot password?</a>
            </div>
            <div class="input-group">
              <input type="password" id="password" class="form-control" placeholder="••••••••" required>
              <button type="button" class="btn btn-outline-secondary" id="toggle-pw">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-sv w-100 py-3 fw-bold" id="login-btn">
            Sign In
          </button>
        </form>

        <p class="text-center text-muted small mt-4 mb-0">
          Don't have an account?
          <a href="/pages/register.html" class="text-violet fw-semibold text-decoration-none">Create one</a>
        </p>
      </div>

    </div>
  </div>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (api.getToken()) window.location.href = '/index.html';

  // ── Google One-Tap / Sign-In ──────────────────────────────────────────────
  async function handleGoogleCredential(response) {
    const btn = document.getElementById('google-btn');
    const errEl = document.getElementById('error-alert');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-border spinner-border-sm me-2" style="width:18px;height:18px"></div> Signing in…';
    errEl.classList.add('d-none');

    try {
      const res = await fetch('/api/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Google sign-in failed.');

      api.setToken(data.token);
      localStorage.setItem('sv_user', JSON.stringify(data.user));
      const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
      window.location.href = redirect;
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('d-none');
      btn.disabled = false;
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continue with Google`;
    }
  }

  // Initialize Google Identity Services once the script loads
  window.addEventListener('load', () => {
    if (typeof google !== 'undefined' && google.accounts) {
      google.accounts.id.initialize({
        client_id: window.GOOGLE_CLIENT_ID || '__GOOGLE_CLIENT_ID__',
        callback: handleGoogleCredential,
        auto_select: false
      });
    }
  });

  // Manual button click → prompt the One-Tap / sign-in flow
  document.getElementById('google-btn').addEventListener('click', () => {
    if (typeof google !== 'undefined' && google.accounts) {
      google.accounts.id.prompt();
    } else {
      document.getElementById('error-alert').textContent = 'Google Sign-In is not available. Please ensure pop-ups are allowed.';
      document.getElementById('error-alert').classList.remove('d-none');
    }
  });

  // ── Email / Password ──────────────────────────────────────────────────────
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.querySelector('#toggle-pw i');
    if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
  });

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-alert');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div> Signing in…';
    errEl.classList.add('d-none');

    try {
      await api.auth.login(
        document.getElementById('email').value,
        document.getElementById('password').value
      );
      const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
      window.location.href = redirect;
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('d-none');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
