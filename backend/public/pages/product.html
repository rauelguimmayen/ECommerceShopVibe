<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product – ShopVibe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container py-5" style="padding-top:100px!important" id="product-detail">
  <!-- Loading state -->
  <div class="row g-5">
    <div class="col-md-6"><div class="skeleton" style="height:450px;border-radius:20px"></div></div>
    <div class="col-md-6">
      <div class="skeleton mb-3" style="height:30px;width:60%"></div>
      <div class="skeleton mb-2" style="height:20px;width:40%"></div>
      <div class="skeleton mb-4" style="height:18px;width:80%"></div>
      <div class="skeleton" style="height:56px;border-radius:12px"></div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-sv-dark py-4 mt-5">
  <div class="container text-center text-white-50 small">&copy; 2026 ShopVibe. All rights reserved.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  fetch('/components/navbar.html').then(r => r.text()).then(html => {
    document.getElementById('navbar-placeholder').innerHTML = html;
    renderNavUser(); cart.load();
    window.addEventListener('scroll', () => {
      document.getElementById('main-navbar')?.classList.toggle('scrolled', window.scrollY > 20);
    });
  });

  async function loadProduct() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { window.location.href = '/pages/shop.html'; return; }

    try {
      const p = await api.products.get(id);
      const discount = p.original_price && p.original_price > p.price
        ? Math.round((1 - p.price / p.original_price) * 100) : null;

      document.title = `${p.name} – ShopVibe`;
      document.getElementById('product-detail').innerHTML = `
        <nav aria-label="breadcrumb" class="mb-4">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/index.html" class="text-decoration-none text-violet">Home</a></li>
            <li class="breadcrumb-item"><a href="/pages/shop.html" class="text-decoration-none text-violet">Shop</a></li>
            <li class="breadcrumb-item active">${p.name}</li>
          </ol>
        </nav>

        <div class="row g-5 align-items-start">
          <!-- Image -->
          <div class="col-md-6">
            <div class="rounded-3 overflow-hidden bg-sv-gray" style="aspect-ratio:1/1">
              <img src="${p.image_url || 'https://via.placeholder.com/600x600?text=No+Image'}"
                   alt="${p.name}" class="w-100 h-100" style="object-fit:cover">
            </div>
          </div>

          <!-- Info -->
          <div class="col-md-6">
            <span class="badge bg-violet-subtle text-violet text-capitalize mb-3 px-3 py-2"
                  style="background:rgba(124,58,237,.12)!important">${p.category}</span>

            ${p.is_featured ? `<div class="mb-2"><span class="badge bg-warning text-dark"><i class="bi bi-star-fill me-1"></i>Featured</span></div>` : ''}

            <h1 class="fw-black mb-2" style="font-size:clamp(1.8rem,4vw,2.8rem)">${p.name}</h1>

            <div class="d-flex align-items-center gap-3 mb-3">
              <span class="text-violet fw-black fs-2">$${p.price.toFixed(2)}</span>
              ${p.original_price ? `
                <span class="text-muted text-decoration-line-through fs-5">$${p.original_price.toFixed(2)}</span>
                <span class="badge bg-danger">-${discount}%</span>` : ''}
            </div>

            <p class="text-muted fs-5 mb-4" style="line-height:1.7">${p.description || 'No description available.'}</p>

            <!-- Stock -->
            <div class="mb-4">
              ${p.stock > 0
                ? `<span class="text-success fw-semibold"><i class="bi bi-check-circle-fill me-1"></i>In Stock (${p.stock} available)</span>`
                : `<span class="text-danger fw-semibold"><i class="bi bi-x-circle-fill me-1"></i>Out of Stock</span>`}
            </div>

            <!-- Tags -->
            ${p.tags && p.tags.length ? `
              <div class="d-flex flex-wrap gap-2 mb-4">
                ${p.tags.map(t => `<span class="badge bg-light text-muted border">${t}</span>`).join('')}
              </div>` : ''}

            <!-- Actions -->
            <div class="d-flex gap-3">
              <button class="btn btn-sv btn-lg flex-grow-1 py-3 d-flex align-items-center justify-content-center gap-2"
                      onclick="cart.add('${p._id}')" ${p.stock === 0 ? 'disabled' : ''}>
                <i class="bi bi-cart-plus fs-5"></i> Add to Cart
              </button>
              <a href="/pages/shop.html" class="btn btn-outline-secondary btn-lg py-3 px-4">
                <i class="bi bi-arrow-left"></i>
              </a>
            </div>
          </div>
        </div>`;
    } catch (e) {
      document.getElementById('product-detail').innerHTML =
        `<div class="text-center py-5"><p class="text-danger">${e.message}</p>
         <a href="/pages/shop.html" class="btn btn-sv">Back to Shop</a></div>`;
    }
  }

  loadProduct();
</script>
</body>
</html>
