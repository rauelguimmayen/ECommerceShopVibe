<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – ShopVibe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-sv-gray" style="min-height:100vh;display:flex;align-items:center">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-8 col-md-6 col-lg-5 col-xl-4">

      <div class="text-center mb-4">
        <a href="/index.html" class="text-decoration-none">
          <div class="d-inline-flex align-items-center gap-2">
            <div class="bg-violet rounded-2 d-flex align-items-center justify-content-center" style="width:40px;height:40px">
              <i class="bi bi-lightning-fill text-white fs-5"></i>
            </div>
            <span class="fw-black fs-3 text-dark">Shop<span class="text-violet">Vibe</span></span>
          </div>
        </a>
        <h5 class="mt-3 fw-bold">Set new password</h5>
        <p class="text-muted small">Must be at least 6 characters</p>
      </div>

      <!-- Invalid / expired token state -->
      <div id="invalid-panel" class="d-none card border-0 shadow-sm p-4 text-center" style="border-radius:20px">
        <div class="mb-3" style="font-size:2.5rem">⚠️</div>
        <h6 class="fw-bold mb-2">Link expired or invalid</h6>
        <p class="text-muted small mb-3">This reset link has expired or already been used. Please request a new one.</p>
        <a href="/pages/forgot-password.html" class="btn btn-sv w-100 py-3 fw-bold">Request New Link</a>
      </div>

      <!-- Success state -->
      <div id="success-panel" class="d-none card border-0 shadow-sm p-4 text-center" style="border-radius:20px">
        <div class="mb-3" style="font-size:2.5rem">✅</div>
        <h6 class="fw-bold mb-2">Password updated!</h6>
        <p class="text-muted small mb-3">You can now sign in with your new password.</p>
        <a href="/pages/login.html" class="btn btn-sv w-100 py-3 fw-bold">Sign In</a>
      </div>

      <div id="reset-card" class="card border-0 shadow-sm p-4" style="border-radius:20px">
        <div id="error-alert" class="alert alert-danger d-none small"></div>

        <form id="reset-form">
          <div class="mb-3">
            <label class="form-label fw-semibold small">New Password</label>
            <div class="input-group">
              <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" minlength="6" required>
              <button type="button" class="btn btn-outline-secondary" id="toggle-pw1"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Confirm Password</label>
            <div class="input-group">
              <input type="password" id="confirm" class="form-control" placeholder="Repeat password" minlength="6" required>
              <button type="button" class="btn btn-outline-secondary" id="toggle-pw2"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <button type="submit" class="btn btn-sv w-100 py-3 fw-bold" id="reset-btn">
            Update Password
          </button>
        </form>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
  const token = new URLSearchParams(window.location.search).get('token');

  // No token in URL → invalid immediately
  if (!token) {
    document.getElementById('reset-card').classList.add('d-none');
    document.getElementById('invalid-panel').classList.remove('d-none');
  }

  // Toggle password visibility helpers
  function togglePw(inputId, btnId) {
    document.getElementById(btnId).addEventListener('click', () => {
      const el = document.getElementById(inputId);
      const icon = document.querySelector(`#${btnId} i`);
      if (el.type === 'password') { el.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { el.type = 'password'; icon.className = 'bi bi-eye'; }
    });
  }
  togglePw('password', 'toggle-pw1');
  togglePw('confirm',  'toggle-pw2');

  document.getElementById('reset-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('reset-btn');
    const errEl = document.getElementById('error-alert');
    const pw  = document.getElementById('password').value;
    const cfm = document.getElementById('confirm').value;

    if (pw !== cfm) {
      errEl.textContent = 'Passwords do not match.';
      errEl.classList.remove('d-none');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div> Updating…';
    errEl.classList.add('d-none');

    try {
      await api.request('/auth/reset-password', {
        method: 'POST',
        body: JSON.stringify({ token, password: pw })
      });
      document.getElementById('reset-card').classList.add('d-none');
      document.getElementById('success-panel').classList.remove('d-none');
    } catch (err) {
      if (err.message.toLowerCase().includes('expired') || err.message.toLowerCase().includes('invalid')) {
        document.getElementById('reset-card').classList.add('d-none');
        document.getElementById('invalid-panel').classList.remove('d-none');
      } else {
        errEl.textContent = err.message;
        errEl.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }
  });
</script>
</body>
</html>
