<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders – ShopVibe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container py-5" style="padding-top:100px!important">
  <p class="text-violet fw-semibold text-uppercase small mb-2">Your Account</p>
  <h1 class="fw-black mb-5" style="font-size:clamp(2.5rem,6vw,4rem)">My Orders</h1>

  <!-- Loading -->
  <div id="orders-loading" class="text-center py-5">
    <div class="spinner-border text-violet"></div>
  </div>

  <!-- Empty -->
  <div id="orders-empty" class="d-none text-center py-5">
    <div class="mx-auto bg-sv-gray rounded-3 d-flex align-items-center justify-content-center mb-4"
         style="width:96px;height:96px">
      <i class="bi bi-bag display-4 text-muted"></i>
    </div>
    <h4 class="fw-bold">No orders yet</h4>
    <p class="text-muted">Start shopping to see your orders here</p>
    <a href="/pages/shop.html" class="btn btn-sv px-5 py-3 mt-2">
      Start Shopping <i class="bi bi-arrow-right ms-1"></i>
    </a>
  </div>

  <!-- Orders list -->
  <div id="orders-list" class="d-none"></div>
</div>

<footer class="bg-sv-dark py-4 mt-5">
  <div class="container text-center text-white-50 small">&copy; 2026 ShopVibe. All rights reserved.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  const STATUS = {
    processing: { label: 'Processing', cls: 'badge-processing', icon: 'bi-clock-fill', border: 'border-violet' },
    shipped:    { label: 'Shipped',    cls: 'badge-shipped',    icon: 'bi-truck',       border: 'border-primary' },
    delivered:  { label: 'Delivered',  cls: 'badge-delivered',  icon: 'bi-check-circle-fill', border: 'border-success' },
    cancelled:  { label: 'Cancelled',  cls: 'badge-cancelled',  icon: 'bi-x-circle-fill', border: 'border-danger' }
  };

  fetch('/components/navbar.html').then(r => r.text()).then(html => {
    document.getElementById('navbar-placeholder').innerHTML = html;
    renderNavUser(); cart.load();
    window.addEventListener('scroll', () => {
      document.getElementById('main-navbar')?.classList.toggle('scrolled', window.scrollY > 20);
    });
  });

  async function loadOrders() {
    if (!api.getToken()) { window.location.href = '/pages/login.html'; return; }

    try {
      const orders = await api.orders.my();
      document.getElementById('orders-loading').classList.add('d-none');

      if (orders.length === 0) {
        document.getElementById('orders-empty').classList.remove('d-none');
        return;
      }

      const list = document.getElementById('orders-list');
      list.classList.remove('d-none');
      list.innerHTML = orders.map(order => {
        const s = STATUS[order.status] || STATUS.processing;
        const date = order.createdAt ? new Date(order.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
        return `
          <div class="card border-2 mb-4 overflow-hidden shadow-sm" style="border-radius:16px">
            <!-- Order Header -->
            <div class="card-header bg-white d-flex flex-column flex-sm-row sm:align-items-center justify-content-between gap-2 py-3">
              <div class="d-flex align-items-center gap-3">
                <i class="bi ${s.icon} ${s.cls.replace('badge-','text-')} fs-5"></i>
                <div>
                  <span class="badge ${s.cls} px-3 py-2 rounded-pill">${s.label}</span>
                  <p class="mb-0 font-monospace small text-muted mt-1">#${order._id?.slice(-8).toUpperCase()}</p>
                </div>
              </div>
              <div class="text-sm-end">
                <p class="fw-black fs-4 mb-0 text-dark">$${order.total_amount?.toFixed(2)}</p>
                <small class="text-muted">${date}</small>
              </div>
            </div>

            <!-- Items -->
            <div class="card-body py-3">
              ${(order.items || []).map(item => `
                <div class="d-flex align-items-center gap-3 mb-2">
                  <img src="${item.product_image || 'https://via.placeholder.com/56'}"
                       class="rounded-2" width="56" height="56" style="object-fit:cover" alt="">
                  <div class="flex-grow-1">
                    <p class="mb-0 fw-semibold">${item.product_name}</p>
                    <small class="text-muted">Qty: ${item.quantity}</small>
                  </div>
                  <span class="fw-bold">$${(item.price * item.quantity).toFixed(2)}</span>
                </div>`).join('')}
            </div>

            <!-- Shipping -->
            ${order.shipping_address ? `
            <div class="card-footer bg-light small text-muted">
              <i class="bi bi-geo-alt me-1"></i>
              ${order.shipping_address.full_name}, ${order.shipping_address.address}, ${order.shipping_address.city}, ${order.shipping_address.country}
            </div>` : ''}
          </div>`;
      }).join('');

    } catch (e) {
      document.getElementById('orders-loading').classList.add('d-none');
      document.getElementById('orders-list').innerHTML =
        `<div class="alert alert-danger">${e.message}</div>`;
      document.getElementById('orders-list').classList.remove('d-none');
    }
  }

  loadOrders();
</script>
</body>
</html>
