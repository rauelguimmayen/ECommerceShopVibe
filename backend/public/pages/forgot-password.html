<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – ShopVibe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-sv-gray" style="min-height:100vh;display:flex;align-items:center">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-8 col-md-6 col-lg-5 col-xl-4">

      <div class="text-center mb-4">
        <a href="/index.html" class="text-decoration-none">
          <div class="d-inline-flex align-items-center gap-2">
            <div class="bg-violet rounded-2 d-flex align-items-center justify-content-center" style="width:40px;height:40px">
              <i class="bi bi-lightning-fill text-white fs-5"></i>
            </div>
            <span class="fw-black fs-3 text-dark">Shop<span class="text-violet">Vibe</span></span>
          </div>
        </a>
        <h5 class="mt-3 fw-bold">Reset your password</h5>
        <p class="text-muted small">Enter your email and we'll send you a reset link</p>
      </div>

      <div class="card border-0 shadow-sm p-4" style="border-radius:20px">
        <div id="error-alert" class="alert alert-danger d-none small"></div>
        <div id="success-panel" class="d-none text-center py-3">
          <div class="mb-3" style="font-size:2.5rem">📬</div>
          <h6 class="fw-bold mb-2">Check your inbox</h6>
          <p class="text-muted small mb-3">If an account exists for <strong id="sent-email"></strong>, you'll receive a reset link shortly.</p>
          <a href="/pages/login.html" class="btn btn-sv w-100 py-3 fw-bold">Back to Sign In</a>
        </div>

        <form id="forgot-form">
          <div class="mb-4">
            <label class="form-label fw-semibold small">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-sv w-100 py-3 fw-bold" id="submit-btn">
            Send Reset Link
          </button>
        </form>

        <p class="text-center text-muted small mt-4 mb-0">
          Remembered it?
          <a href="/pages/login.html" class="text-violet fw-semibold text-decoration-none">Sign in</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
  if (api.getToken()) window.location.href = '/index.html';

  document.getElementById('forgot-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-alert');
    const email = document.getElementById('email').value;
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div> Sending…';
    errEl.classList.add('d-none');

    try {
      await api.request('/auth/forgot-password', {
        method: 'POST',
        body: JSON.stringify({ email })
      });
      document.getElementById('sent-email').textContent = email;
      document.getElementById('forgot-form').classList.add('d-none');
      document.querySelector('.text-center.text-muted.small.mt-4').classList.add('d-none');
      document.getElementById('success-panel').classList.remove('d-none');
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('d-none');
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  });
</script>
</body>
</html>
