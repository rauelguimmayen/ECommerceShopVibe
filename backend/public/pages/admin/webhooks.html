<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webhooks – ShopVibe Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .event-badge { font-size:.72rem; padding:3px 8px; border-radius:20px; background:#ede9fe; color:#6d28d9; font-weight:600; }
    .delivery-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
    .secret-blur { filter:blur(4px); transition:.2s; cursor:pointer; user-select:none; font-family:monospace; font-size:.8rem; }
    .secret-blur:hover { filter:none; }
    pre { background:#f8f9fa; border-radius:8px; padding:12px; font-size:.78rem; white-space:pre-wrap; word-break:break-all; }
  </style>
</head>
<body class="bg-sv-gray">
<div id="navbar-placeholder"></div>

<div class="container-lg py-5" style="margin-top:76px">

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
    <div>
      <h4 class="fw-black mb-1">Webhooks</h4>
      <p class="text-muted small mb-0">Get notified when events happen in your store</p>
    </div>
    <button class="btn btn-sv px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#addModal">
      <i class="bi bi-plus-lg me-2"></i>Add Webhook
    </button>
  </div>

  <!-- Supported events reference card -->
  <div class="card border-0 shadow-sm mb-4 p-3" style="border-radius:16px">
    <p class="fw-semibold small mb-2">Supported events</p>
    <div class="d-flex flex-wrap gap-2">
      <span class="event-badge">*</span>
      <span class="event-badge">order.created</span>
      <span class="event-badge">order.status_updated</span>
      <span class="event-badge">user.registered</span>
      <span class="event-badge">user.password_reset</span>
      <span class="event-badge">ping</span>
    </div>
  </div>

  <!-- Webhook list -->
  <div id="hooks-list">
    <div class="text-center py-5 text-muted">
      <div class="spinner-border mb-3" style="color:#7C3AED"></div><br>Loading…
    </div>
  </div>
</div>

<!-- ── Add Webhook Modal ───────────────────────────────────────────────── -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow" style="border-radius:20px">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">New Webhook</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2">
        <div id="add-error" class="alert alert-danger d-none small"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Endpoint URL</label>
          <input type="url" id="add-url" class="form-control" placeholder="https://your-server.com/webhook">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Events <span class="text-muted fw-normal">(hold Ctrl/Cmd for multiple)</span></label>
          <select id="add-events" class="form-select" multiple size="6">
            <option value="*" selected>* (all events)</option>
            <option value="order.created">order.created</option>
            <option value="order.status_updated">order.status_updated</option>
            <option value="user.registered">user.registered</option>
            <option value="user.password_reset">user.password_reset</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Signing Secret <span class="text-muted fw-normal">(auto-generated if blank)</span></label>
          <input type="text" id="add-secret" class="form-control font-monospace" placeholder="Leave blank to auto-generate">
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sv fw-bold px-4" id="add-btn" onclick="createWebhook()">Create</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Detail / Delivery Log Modal ───────────────────────────────────────── -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow" style="border-radius:20px">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Delivery Log</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detail-body">Loading…</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  fetch('/components/navbar.html').then(r => r.text()).then(html => {
    document.getElementById('navbar-placeholder').innerHTML = html;
    renderNavUser();
  });

  // Admin guard
  if (!api.getToken()) window.location.href = '/pages/login.html';

  // ── Load hooks ──────────────────────────────────────────────────────────────
  async function loadHooks() {
    try {
      const hooks = await api.request('/webhooks');
      renderHooks(hooks);
    } catch (err) {
      document.getElementById('hooks-list').innerHTML =
        `<div class="alert alert-danger">${err.message}</div>`;
    }
  }

  function renderHooks(hooks) {
    const el = document.getElementById('hooks-list');
    if (!hooks.length) {
      el.innerHTML = `
        <div class="card border-0 shadow-sm p-5 text-center" style="border-radius:16px">
          <div style="font-size:2.5rem">🔔</div>
          <h6 class="fw-bold mt-3 mb-1">No webhooks yet</h6>
          <p class="text-muted small">Add one to start receiving event notifications.</p>
        </div>`;
      return;
    }

    el.innerHTML = hooks.map(h => {
      const lastDelivery = h.deliveries[h.deliveries.length - 1];
      const lastStatus   = lastDelivery
        ? `<span class="delivery-dot bg-${lastDelivery.success ? 'success' : 'danger'} me-1"></span>
           <span class="small text-muted">${lastDelivery.success ? 'Last delivery OK' : 'Last delivery failed'}</span>`
        : `<span class="small text-muted">No deliveries yet</span>`;

      return `
      <div class="card border-0 shadow-sm mb-3" style="border-radius:16px">
        <div class="card-body p-4">
          <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
            <div class="flex-grow-1 min-width-0">
              <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
                <span class="badge ${h.active ? 'bg-success' : 'bg-secondary'}">${h.active ? 'Active' : 'Inactive'}</span>
                <code class="text-break small">${h.url}</code>
              </div>
              <div class="d-flex flex-wrap gap-1 mb-2">
                ${h.events.map(e => `<span class="event-badge">${e}</span>`).join('')}
              </div>
              <div class="d-flex align-items-center gap-3 flex-wrap">
                ${lastStatus}
                <span class="small text-muted">Secret: <span class="secret-blur" title="Hover to reveal">${h.secret}</span></span>
              </div>
            </div>
            <div class="d-flex gap-2 flex-shrink-0">
              <button class="btn btn-sm btn-outline-secondary" onclick="pingHook('${h._id}')" title="Send test ping">
                <i class="bi bi-send"></i>
              </button>
              <button class="btn btn-sm btn-outline-secondary" onclick="showLog('${h._id}')" title="Delivery log">
                <i class="bi bi-list-ul"></i>
              </button>
              <button class="btn btn-sm btn-outline-secondary" onclick="toggleHook('${h._id}', ${!h.active})" title="${h.active ? 'Disable' : 'Enable'}">
                <i class="bi bi-${h.active ? 'pause' : 'play'}"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteHook('${h._id}')" title="Delete">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Create ──────────────────────────────────────────────────────────────────
  async function createWebhook() {
    const btn    = document.getElementById('add-btn');
    const errEl  = document.getElementById('add-error');
    const url    = document.getElementById('add-url').value.trim();
    const events = Array.from(document.getElementById('add-events').selectedOptions).map(o => o.value);
    const secret = document.getElementById('add-secret').value.trim();

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div>Creating…';
    errEl.classList.add('d-none');

    try {
      await api.request('/webhooks', {
        method: 'POST',
        body: JSON.stringify({ url, events, ...(secret && { secret }) })
      });
      bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
      document.getElementById('add-url').value = '';
      document.getElementById('add-secret').value = '';
      loadHooks();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('d-none');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create';
    }
  }

  // ── Ping ────────────────────────────────────────────────────────────────────
  async function pingHook(id) {
    try {
      await api.request(`/webhooks/${id}/ping`, { method: 'POST' });
      setTimeout(loadHooks, 1500); // reload after delivery logged
    } catch (err) { alert(err.message); }
  }

  // ── Toggle active ───────────────────────────────────────────────────────────
  async function toggleHook(id, active) {
    try {
      await api.request(`/webhooks/${id}`, { method: 'PATCH', body: JSON.stringify({ active }) });
      loadHooks();
    } catch (err) { alert(err.message); }
  }

  // ── Delete ──────────────────────────────────────────────────────────────────
  async function deleteHook(id) {
    if (!confirm('Delete this webhook?')) return;
    try {
      await api.request(`/webhooks/${id}`, { method: 'DELETE' });
      loadHooks();
    } catch (err) { alert(err.message); }
  }

  // ── Delivery log ────────────────────────────────────────────────────────────
  async function showLog(id) {
    const modal = new bootstrap.Modal(document.getElementById('detailModal'));
    const body  = document.getElementById('detail-body');
    body.innerHTML = '<div class="text-center py-3"><div class="spinner-border" style="color:#7C3AED"></div></div>';
    modal.show();

    try {
      const hook = await api.request(`/webhooks/${id}`);
      const logs = [...hook.deliveries].reverse();

      body.innerHTML = `
        <p class="text-muted small mb-3">Endpoint: <code>${hook.url}</code> — last 10 deliveries (newest first)</p>
        ${!logs.length
          ? '<p class="text-muted text-center py-3">No deliveries yet. Send a ping to test.</p>'
          : logs.map(d => `
            <div class="d-flex align-items-start gap-3 mb-3 p-3 rounded-3 bg-light">
              <span class="delivery-dot bg-${d.success ? 'success' : 'danger'} mt-1 flex-shrink-0"></span>
              <div class="flex-grow-1">
                <div class="d-flex justify-content-between flex-wrap gap-1">
                  <span class="event-badge">${d.event}</span>
                  <span class="small text-muted">${new Date(d.sentAt).toLocaleString()}</span>
                </div>
                <div class="small mt-1">
                  ${d.success
                    ? `<span class="text-success fw-semibold">HTTP ${d.statusCode}</span>`
                    : `<span class="text-danger fw-semibold">FAILED</span>${d.error ? ` — ${d.error}` : ''}`}
                </div>
              </div>
            </div>`).join('')}`;
    } catch (err) {
      body.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
  }

  loadHooks();
</script>
</body>
</html>
